alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- engine: MYSQL
  name: mysql
  production: true
  version: "8"
- engine: REDIS
  name: redis
  production: true
  version: "7"
domains:
- domain: zcraig.me
  type: PRIMARY
  zone: zcraig.me
envs:
- key: APP_ENV
  scope: RUN_AND_BUILD_TIME
  value: production
- key: APP_DEBUG
  scope: RUN_AND_BUILD_TIME
  value: "false"
- key: LOG_CHANNEL
  scope: RUN_AND_BUILD_TIME
  value: stderr
- key: LOG_LEVEL
  scope: RUN_AND_BUILD_TIME
  value: warning
- key: DB_CONNECTION
  scope: RUN_AND_BUILD_TIME
  value: mysql
- key: CACHE_DRIVER
  scope: RUN_AND_BUILD_TIME
  value: database
- key: QUEUE_CONNECTION
  scope: RUN_AND_BUILD_TIME
  value: redis
- key: SESSION_DRIVER
  scope: RUN_AND_BUILD_TIME
  value: redis
- key: SESSION_LIFETIME
  scope: RUN_AND_BUILD_TIME
  value: "120"
- key: SESSION_SECURE_COOKIE
  scope: RUN_AND_BUILD_TIME
  value: "true"
- key: UPLOAD_DISK
  scope: RUN_AND_BUILD_TIME
  value: spaces
- key: UPLOAD_PATH
  scope: RUN_AND_BUILD_TIME
  value: site_uploads
- key: SENTRY_TRACES_SAMPLE_RATE
  scope: RUN_AND_BUILD_TIME
  value: "0.1"
- key: REDIS_URL
  scope: RUN_AND_BUILD_TIME
  value: ${redis.REDIS_URL}
ingress:
  rules:
  - component:
      name: website-laravel
    match:
      authority: {}
      path:
        prefix: /
maintenance: {}
name: dolphin-app
region: nyc
services:
- alerts:
  - operator: GREATER_THAN
    rule: CPU_UTILIZATION
    value: 90
    window: FIVE_MINUTES
  dockerfile_path: .docker/Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${mysql.DATABASE_URL}
  github:
    branch: master
    deploy_on_push: true
    repo: zack6849/website-laravel
  http_port: 80
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-2gb
  name: website-laravel
  health_check:
    http_path: /
  source_dir: /
workers:
- dockerfile_path: .docker/Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${mysql.DATABASE_URL}
  github:
    branch: master
    deploy_on_push: true
    repo: zack6849/website-laravel
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: queue-worker
  run_command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-jobs=500 --max-time=3600
  source_dir: /
jobs:
- dockerfile_path: .docker/Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${mysql.DATABASE_URL}
  github:
    branch: master
    repo: zack6849/website-laravel
  instance_size_slug: apps-s-1vcpu-0.5gb
  kind: PRE_DEPLOY
  name: migrate
  run_command: php artisan migrate --force
  source_dir: /
- dockerfile_path: .docker/Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${mysql.DATABASE_URL}
  github:
    branch: master
    repo: zack6849/website-laravel
  instance_size_slug: apps-s-1vcpu-0.5gb
  kind: SCHEDULED
  name: scheduler
  run_command: php artisan schedule:run
  schedule:
    cron: "* * * * *"
    time_zone: America/New_York
  source_dir: /
